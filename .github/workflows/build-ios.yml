name: Build Sonic 3 AIR Native IPA
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: brew install cmake sdl2 libogg libvorbis

      - name: Configure and Build
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DSDL2_INCLUDE_DIR=$(brew --prefix sdl2)/include/SDL2 \
            -G "Xcode"
          xcodebuild -project sonic3air.xcodeproj -scheme sonic3air -sdk iphoneos -configuration Release archive -archivePath $PWD/sonic3air.xcarchive
          xcodebuild -exportArchive -archivePath $PWD/sonic3air.xcarchive -exportOptionsPlist exportOptions.plist -exportPath $PWD/build

      - name: Package IPA
        run: |
          mkdir -p Payload/Sonic3AIR.app
          cp -r build/*.app/* Payload/Sonic3AIR.app/
          zip -r sonic3air_native.ipa Payload/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: s3air-native-ipa
          path: sonic3air_native.ipa
