name: Build Sonic 3 AIR Native IPA
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: brew install cmake sdl2 libogg libvorbis

      - name: Configure and Build
        run: |
          mkdir build && cd build
          cmake ../desktop \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -G "Unix Makefiles"
          make sonic3air
      
      - name: Package IPA
        run: |
          mkdir -p Payload/Sonic3AIR.app
          find build -name "sonic3air" -exec cp {} Payload/Sonic3AIR.app/ \;
          zip -r sonic3air_native.ipa Payload/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: s3air-native-ipa
          path: sonic3air_native.ipa
